<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colyseus 连接测试</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        background: #f5f5f5;
        color: #333;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #1a1a2e;
          color: #e0e0e0;
        }
      }

      .header {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: #fff;
        padding: 20px 24px;
        text-align: center;
      }

      .header h1 {
        font-size: 22px;
        font-weight: 600;
      }

      .header p {
        font-size: 13px;
        opacity: 0.85;
        margin-top: 4px;
      }

      .container {
        max-width: 640px;
        width: 100%;
        margin: 0 auto;
        padding: 20px;
        flex: 1;
      }

      .card {
        background: #fff;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      @media (prefers-color-scheme: dark) {
        .card {
          background: #16213e;
          box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }
      }

      .card-title {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 14px;
        color: #667eea;
      }

      .form-row {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      .form-row label {
        font-size: 13px;
        font-weight: 500;
        min-width: 60px;
        flex-shrink: 0;
      }

      .form-row input,
      .form-row select {
        flex: 1;
        min-width: 120px;
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
        background: #fafafa;
        color: #333;
        transition: border-color 0.2s;
      }

      @media (prefers-color-scheme: dark) {
        .form-row input,
        .form-row select {
          background: #0f3460;
          color: #e0e0e0;
          border-color: #333;
        }
      }

      .form-row input:focus,
      .form-row select:focus {
        outline: none;
        border-color: #667eea;
      }

      .btn-group {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      button {
        padding: 8px 18px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.1s;
      }

      button:active {
        transform: scale(0.97);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-primary {
        background: #667eea;
        color: #fff;
      }

      .btn-primary:hover:not(:disabled) {
        background: #5a6fd6;
      }

      .btn-danger {
        background: #e74c3c;
        color: #fff;
      }

      .btn-danger:hover:not(:disabled) {
        background: #c0392b;
      }

      .btn-outline {
        background: transparent;
        border: 1px solid #667eea;
        color: #667eea;
      }

      .btn-outline:hover:not(:disabled) {
        background: #667eea;
        color: #fff;
      }

      .status-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        margin-bottom: 12px;
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #ccc;
        flex-shrink: 0;
      }

      .status-dot.connected {
        background: #2ecc71;
        box-shadow: 0 0 6px rgba(46, 204, 113, 0.5);
      }

      .status-dot.disconnected {
        background: #e74c3c;
        box-shadow: 0 0 6px rgba(231, 76, 60, 0.5);
      }

      .log-area {
        background: #1e1e1e;
        color: #d4d4d4;
        border-radius: 10px;
        padding: 14px;
        height: 280px;
        overflow-y: auto;
        font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
        font-size: 12px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-all;
      }

      @media (prefers-color-scheme: dark) {
        .log-area {
          background: #0a0a1a;
        }
      }

      .log-entry {
        margin-bottom: 2px;
      }

      .log-entry.info {
        color: #569cd6;
      }
      .log-entry.success {
        color: #6a9955;
      }
      .log-entry.error {
        color: #f44747;
      }
      .log-entry.send {
        color: #ce9178;
      }
      .log-entry.receive {
        color: #4ec9b0;
      }
      .log-entry.system {
        color: #c586c0;
      }

      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
      }

      .badge-success {
        background: rgba(46, 204, 113, 0.2);
        color: #2ecc71;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Colyseus 连接测试工具</h1>
      <p>测试与 Colyseus 服务端的 WebSocket 连接与通信</p>
    </div>

    <div class="container">
      <!-- 连接配置 -->
      <div class="card">
        <div class="card-title">连接配置</div>
        <div class="form-row">
          <label for="serverUrl">服务器地址</label>
          <input type="text" id="serverUrl" value="ws://localhost:2567" placeholder="ws://localhost:2567" />
        </div>
        <div class="form-row">
          <label for="roomName">房间名称</label>
          <input type="text" id="roomName" value="mahjong_room" placeholder="mahjong_room" />
        </div>
        <div class="form-row">
          <label for="token">Token</label>
          <input
            type="text"
            id="token"
            value="game.v1.eyJzdWIiOiJ3ZWNoYXQ6bWFoam9uZzpvVkRSMjVGTkM1WG1jazdsamw0RjBsMWthRlBNIiwibmFtZSI6InBsYXllciIsImF2YXRhclVybCI6IiIsInJvbGVzIjpbInBsYXllciJdLCJnYW1lSWQiOiJtYWhqb25nIiwicHJvdmlkZXIiOiJ3ZWNoYXRfbWluaWdhbWUiLCJpYXQiOjE3ODIwMTc1NjgsImV4cCI6MTc4MjYyMjM2OH0.iz_ue5G9kk6UyF6CfsglDFtFzopH4InU3EYzTpzSqhk"
            placeholder=""
          />
        </div>
        <div class="btn-group">
          <button class="btn-primary" id="btnConnect" onclick="doConnect()">连接</button>
          <button class="btn-danger" id="btnDisconnect" onclick="doDisconnect()" disabled>断开</button>
          <button class="btn-primary" id="btnJoin" onclick="doJoinRoom()" disabled>加入房间</button>
          <button class="btn-danger" id="btnLeave" onclick="doLeaveRoom()" disabled>离开房间</button>
        </div>
        <div class="status-bar" style="margin-top: 12px">
          <span id="statusDot" class="status-dot disconnected"></span>
          <span id="statusText">未连接</span>
          <span id="roomBadge" style="margin-left: auto"></span>
        </div>
      </div>

      <!-- 发送消息 -->
      <div class="card">
        <div class="card-title">发送消息</div>
        <div class="form-row">
          <label for="msgType">消息类型</label>
          <select id="msgType">
            <option value="move">move</option>
            <option value="ready">ready</option>
            <option value="mahjong_action">mahjong_action</option>
          </select>
        </div>
        <div class="form-row">
          <label for="msgPayload">消息内容</label>
          <input type="text" id="msgPayload" value='{"x":0,"y":0}' placeholder='{"key":"value"}' />
        </div>
        <div class="btn-group">
          <button class="btn-primary" id="btnSend" onclick="doSendMessage()" disabled>发送</button>
        </div>
      </div>

      <!-- 日志输出 -->
      <div class="card">
        <div class="card-title" style="display: flex; justify-content: space-between; align-items: center">
          <span>日志</span>
          <button class="btn-outline" style="font-size: 12px; padding: 4px 12px" onclick="doClearLogs()">清空</button>
        </div>
        <div class="log-area" id="logArea"></div>
      </div>
    </div>

    <script src="public/index.js"></script>
  </body>
</html>
